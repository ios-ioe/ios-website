name: Supabase keep-alive

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Auth API (project wake)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Add Actions secrets SUPABASE_URL and SUPABASE_ANON_KEY."
            exit 1
          fi
          curl -fsS "${SUPABASE_URL}/auth/v1/health" \
            -H "apikey: ${SUPABASE_ANON_KEY}"

      - name: Ping PostgREST (touches database path)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/blog_posts?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "POST /blog_posts probe HTTP ${code}"
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::warning::REST probe failed (HTTP ${code}). If anon cannot SELECT blog_posts, add a public read policy or remove this step."
            exit 1
          fi
